<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Image Gallery</h1>

<!-- Filter Buttons -->
<div class="filters">
  <button onclick="filterSelection('all')">All</button>
  <button onclick="filterSelection('nature')">Nature</button>
  <button onclick="filterSelection('city')">City</button>
</div>

<!-- Gallery -->
<div class="gallery">
  <div class="gallery-item nature">
    <img src="https://picsum.photos/id/1015/400/300" onclick="openLightbox(this)">
  </div>
  <div class="gallery-item city">
    <img src="https://picsum.photos/id/1011/400/300" onclick="openLightbox(this)">
  </div>
  <div class="gallery-item nature">
    <img src="https://picsum.photos/id/1016/400/300" onclick="openLightbox(this)">
  </div>
  <div class="gallery-item city">
    <img src="https://picsum.photos/id/1020/400/300" onclick="openLightbox(this)">
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <span class="close" onclick="closeLightbox()">×</span>
  <img id="lightbox-img">
  <button class="prev" onclick="changeImage(-1)">❮</button>
  <button class="next" onclick="changeImage(1)">❯</button>
</div>

<script src="script.js"></script>
</body>
</html>
